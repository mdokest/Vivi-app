<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVID</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0f;
            font-family: system-ui, sans-serif;
        }
        .app {
            max-width: 430px;
            margin: 0 auto;
            background: #0a0a0f;
            min-height: 100vh;
        }
        .header {
            padding: 16px;
            background: #0a0a0f;
            border-bottom: 1px solid #2a2a40;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff2d6f, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        button {
            background: #ff2d6f;
            border: none;
            padding: 12px 20px;
            color: white;
            border-radius: 12px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .chat-list {
            padding: 10px;
        }
        .chat-item {
            background: #13131f;
            padding: 15px;
            margin: 8px;
            border-radius: 12px;
            cursor: pointer;
        }
        .chat-name {
            color: white;
            font-weight: bold;
        }
        .chat-msg {
            color: #7b7b9a;
            font-size: 13px;
            margin-top: 4px;
        }
        .hide {
            display: none;
        }
        .back-btn {
            background: none;
            font-size: 24px;
            padding: 10px;
        }
        .chat-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0f;
            max-width: 430px;
            margin: 0 auto;
        }
        .chat-header {
            padding: 16px;
            background: #13131f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .messages {
            height: 70vh;
            overflow-y: auto;
            padding: 16px;
        }
        .message {
            padding: 10px;
            margin: 8px;
            border-radius: 12px;
            max-width: 70%;
        }
        .message-out {
            background: #ff2d6f;
            margin-left: auto;
            color: white;
        }
        .message-in {
            background: #1e1e35;
            color: white;
        }
        .input-area {
            display: flex;
            padding: 16px;
            gap: 10px;
            background: #13131f;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #1a1a2e;
            color: white;
        }
        .send-btn {
            background: #ff2d6f;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Main Chat List -->
    <div id="main-screen">
        <div class="header">
            <div class="logo">VIVID</div>
        </div>
        <div class="chat-list" id="chat-list"></div>
    </div>

    <!-- Chat Detail -->
    <div id="chat-screen" class="chat-screen hide">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">←</button>
            <div style="color: white; font-weight: bold;" id="chat-name"></div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Message...">
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<script>
    // Simple chat data
    const chats = [
        { id: 1, name: "Zara Mokoena", lastMsg: "Hey! How are you?", unread: 0 },
        { id: 2, name: "Lebo Dlamini", lastMsg: "Check this out!", unread: 2 },
        { id: 3, name: "Thabo Khumalo", lastMsg: "Great photos!", unread: 0 },
        { id: 4, name: "Naledi Sithole", lastMsg: "Recipe ready 🍲", unread: 0 }
    ];
    
    let messages = {
        1: [{ from: 1, text: "Hey! How are you?", time: "10:02" }, { from: 5, text: "I'm good!", time: "10:04" }],
        2: [{ from: 2, text: "Try my challenge!", time: "09:30" }],
        3: [{ from: 3, text: "Check my shots!", time: "Yesterday" }],
        4: [{ from: 4, text: "Recipe almost ready", time: "12m ago" }]
    };
    
    let currentChatId = null;
    
    function renderChatList() {
        const container = document.getElementById("chat-list");
        if (!container) return;
        
        container.innerHTML = chats.map(chat => `
            <div class="chat-item" onclick="openChat(${chat.id})">
                <div class="chat-name">${chat.name}</div>
                <div class="chat-msg">${chat.lastMsg}</div>
            </div>
        `).join("");
    }
    
    function openChat(chatId) {
        currentChatId = chatId;
        document.getElementById("main-screen").classList.add("hide");
        document.getElementById("chat-screen").classList.remove("hide");
        document.getElementById("chat-name").innerText = chats.find(c => c.id === chatId).name;
        renderMessages();
    }
    
    function renderMessages() {
        const container = document.getElementById("messages");
        if (!container || !currentChatId) return;
        
        const msgs = messages[currentChatId] || [];
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.from === 5 ? 'message-out' : 'message-in'}">
                ${msg.text}
            </div>
        `).join("");
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById("message-input");
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        
        const newMsg = { from: 5, text: text, time: new Date().toLocaleTimeString() };
        
        if (!messages[currentChatId]) messages[currentChatId] = [];
        messages[currentChatId].push(newMsg);
        
        const chat = chats.find(c => c.id === currentChatId);
        chat.lastMsg = text;
        
        input.value = "";
        renderMessages();
        renderChatList();
    }
    
    function closeChat() {
        document.getElementById("main-screen").classList.remove("hide");
        document.getElementById("chat-screen").classList.add("hide");
        currentChatId = null;
    }
    
    renderChatList();
</script>
</body>
</html>
