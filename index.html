<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VIVID - Social App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #f0f0ff;
        }
        
        #app {
            max-width: 430px;
            margin: 0 auto;
            height: 100vh;
            background: #0a0a0f;
            position: relative;
            overflow: hidden;
        }
        
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #13131f;
            display: flex;
            height: 72px;
            border-top: 1px solid rgba(42,42,64,0.2);
            backdrop-filter: blur(20px);
        }
        
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
        }
        
        .tab-icon {
            font-size: 26px;
        }
        
        .tab-label {
            font-size: 10px;
            font-weight: 700;
            color: #7b7b9a;
        }
        
        .tab-active .tab-label {
            color: #ff2d6f;
        }
        
        .screen {
            height: 100%;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        
        .header {
            padding: 16px 18px;
            background: #0a0a0f;
            border-bottom: 1px solid #2a2a40;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff2d6f, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        
        .story-row {
            display: flex;
            gap: 14px;
            padding: 14px 0 14px 16px;
            overflow-x: auto;
        }
        
        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        
        .story-ring {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff2d6f, #7c3aed, #00e5ff);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .story-inner {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .post-card {
            background: #13131f;
            border-bottom: 1px solid #2a2a40;
        }
        
        .post-header {
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        
        .post-content {
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
        }
        
        .post-stats {
            display: flex;
            gap: 20px;
            padding: 12px 16px;
        }
        
        .stat-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            color: #7b7b9a;
            font-size: 14px;
        }
        
        .chat-row {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 12px 18px;
            border-bottom: 1px solid rgba(42,42,64,0.2);
            cursor: pointer;
        }
        
        .hide {
            display: none;
        }
        
        .chat-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .chat-header {
            padding: 12px 14px;
            background: #13131f;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #2a2a40;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 76%;
            padding: 10px 13px;
            border-radius: 18px;
            font-size: 14px;
        }
        
        .message-out {
            background: linear-gradient(135deg, #ff2d6f, #7c3aed);
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
        }
        
        .message-in {
            background: #1e1e35;
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
        }
        
        .chat-input-bar {
            padding: 8px 10px;
            background: #13131f;
            border-top: 1px solid #2a2a40;
            display: flex;
            gap: 6px;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            background: #1a1a2e;
            border-radius: 22px;
            padding: 10px 14px;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #ff2d6f, #7c3aed);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }
        
        .profile-card {
            text-align: center;
            padding: 28px 20px;
            background: linear-gradient(180deg, rgba(255,45,111,0.2) 0%, transparent 100%);
        }
        
        .avatar-lg {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
        }
        
        .reel-container {
            position: relative;
            height: 100%;
            background: linear-gradient(160deg, #ff2d6f, #7c3aed, #0a0a0f);
        }
        
        .filter-btn {
            transition: all 0.2s;
        }
        
        .unread-badge {
            background: #ff2d6f;
            border-radius: 10px;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            padding: 0 5px;
        }
        
        ::-webkit-scrollbar {
            width: 0;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Messages Screen -->
    <div id="messages-screen" class="screen">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="logo">VIVID</div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="showAddModal()" style="background: #ff2d6f22; border: 1px solid #ff2d6f44; border-radius: 20px; padding: 6px 12px; color: #ff2d6f; font-size: 12px; font-weight: bold; cursor: pointer;">➕ Add</button>
                </div>
            </div>
            <div style="background: #1a1a2e; border-radius: 14px; padding: 9px 14px; margin-top: 12px;">
                <span>🔍</span> <input type="text" id="search-input" placeholder="Search messages..." style="background: none; border: none; color: white; width: 90%; outline: none;">
            </div>
            <div style="display: flex; gap: 6px; margin-top: 12px;">
                <button onclick="filterChats('all')" id="filter-all" class="filter-btn" style="background: #ff2d6f; border: none; border-radius: 20px; padding: 6px 14px; color: white; font-weight: bold; cursor: pointer;">All</button>
                <button onclick="filterChats('unread')" id="filter-unread" class="filter-btn" style="background: #1a1a2e; border: none; border-radius: 20px; padding: 6px 14px; color: #7b7b9a; font-weight: bold; cursor: pointer;">Unread</button>
                <button onclick="filterChats('groups')" id="filter-groups" class="filter-btn" style="background: #1a1a2e; border: none; border-radius: 20px; padding: 6px 14px; color: #7b7b9a; font-weight: bold; cursor: pointer;">Groups</button>
            </div>
        </div>
        <div id="chat-list"></div>
    </div>
    
    <!-- Home Screen -->
    <div id="home-screen" class="screen hide">
        <div class="header">
            <div style="display: flex; justify-content: space-between;">
                <div class="logo">VIVID</div>
                <div style="font-size: 13px; color: #7b7b9a;">🇿🇦 East Rand</div>
            </div>
        </div>
        <div id="stories-row" class="story-row"></div>
        <div id="feed-posts"></div>
    </div>
    
    <!-- Reels Screen -->
    <div id="reels-screen" class="screen hide"></div>
    
    <!-- Profile Screen -->
    <div id="profile-screen" class="screen hide"></div>
    
    <!-- Chat Detail View -->
    <div id="chat-detail" class="hide" style="height: 100%; display: flex; flex-direction: column;">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">←</button>
            <div id="chat-avatar" class="avatar" style="width: 42px; height: 42px;"></div>
            <div>
                <div id="chat-name" style="font-weight: bold;"></div>
                <div id="chat-status" style="font-size: 12px; color: #7b7b9a;"></div>
            </div>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-bar">
            <button onclick="toggleEmoji()" style="background: none; border: none; font-size: 22px; cursor: pointer;">😊</button>
            <input type="text" id="message-input" class="chat-input" placeholder="Message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
    
    <!-- Bottom Tab Bar -->
    <div class="tab-bar">
        <button class="tab-btn" onclick="switchTab('messages')">
            <div class="tab-icon">💬</div>
            <div class="tab-label">Chats</div>
        </button>
        <button class="tab-btn" onclick="switchTab('home')">
            <div class="tab-icon">🏠</div>
            <div class="tab-label">Feed</div>
        </button>
        <button class="tab-btn" onclick="switchTab('create')">
            <div class="tab-icon">📷</div>
            <div class="tab-label">Create</div>
        </button>
        <button class="tab-btn" onclick="switchTab('reels')">
            <div class="tab-icon">🎬</div>
            <div class="tab-label">Reels</div>
        </button>
        <button class="tab-btn" onclick="switchTab('profile')">
            <div class="tab-icon">👤</div>
            <div class="tab-label">Me</div>
        </button>
    </div>
</div>

<!-- Add Friend Modal -->
<div id="add-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: flex-end; justify-content: center;">
    <div style="background: #13131f; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-width: 430px; margin: 0 auto;">
        <div style="width: 40px; height: 4px; background: #2a2a40; border-radius: 2px; margin: 0 auto 20px;"></div>
        <div style="font-size: 18px; font-weight: bold; margin-bottom: 6px;">Add Friend by Phone</div>
        <div style="color: #7b7b9a; font-size: 13px; margin-bottom: 20px;">Enter South African number</div>
        <div style="display: flex; gap: 10px;">
            <input type="tel" id="phone-input" placeholder="+27 74 857 5764" style="flex: 1; background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 14px; padding: 12px; color: white; outline: none;">
            <button onclick="searchPhone()" style="background: linear-gradient(135deg, #ff2d6f, #7c3aed); border: none; border-radius: 14px; padding: 12px 18px; color: white; font-weight: bold; cursor: pointer;">Find</button>
        </div>
        <div id="phone-result" style="margin-top: 16px;"></div>
    </div>
</div>

<script>
    // Users Data
    const USERS = [
        { id: 1, name: "Zara Mokoena", handle: "@zaravibes", phone: "+27821112233", avatar: "ZM", color: "#ff2d6f", followers: "124K" },
        { id: 2, name: "Lebo Dlamini", handle: "@lebo.moves", phone: "+27734445566", avatar: "LD", color: "#7c3aed", followers: "56.2K" },
        { id: 3, name: "Thabo Khumalo", handle: "@thabocreates", phone: "+27617778899", avatar: "TK", color: "#00e5ff", followers: "9.8K" },
        { id: 4, name: "Naledi Sithole", handle: "@naledi.s", phone: "+27793216543", avatar: "NS", color: "#ffd600", followers: "31K" },
        { id: 5, name: "Doctor T", handle: "@doctor_t", phone: "+27748575764", avatar: "DT", color: "#ff6b35", followers: "1.2K" }
    ];
    const ME = USERS[4];
    
    // Chats Data
    let CHATS = [
        { id: 1, type: "dm", user: USERS[0], lastMsg: "Hey! How are you?", time: "10:08", unread: 0, online: true },
        { id: 2, type: "dm", user: USERS[1], lastMsg: "Try my challenge!", time: "09:45", unread: 1, online: true },
        { id: 3, type: "dm", user: USERS[2], lastMsg: "Great shots!", time: "Yesterday", unread: 0, online: false },
        { id: 4, type: "dm", user: USERS[3], lastMsg: "Recipe almost ready", time: "12m ago", unread: 0, online: false }
    ];
    
    // Messages Data
    let MESSAGES = {
        1: [
            { id: 1, from: 1, text: "Hey! How are you?", time: "10:02" },
            { id: 2, from: 5, text: "I'm good! Working on content 💪", time: "10:04" }
        ],
        2: [
            { id: 1, from: 2, text: "Try my new challenge!", time: "09:30" },
            { id: 2, from: 5, text: "Haha I'll try it 😂", time: "09:32" }
        ],
        3: [
            { id: 1, from: 3, text: "Check out my latest shots 📸", time: "Yesterday" }
        ],
        4: [
            { id: 1, from: 4, text: "Recipe is almost ready 🍲", time: "12m ago" }
        ]
    };
    
    // Stories Data
    const STORIES = [
        { id: 1, user: USERS[0], seen: false },
        { id: 2, user: USERS[1], seen: false },
        { id: 3, user: USERS[2], seen: true },
        { id: 4, user: USERS[3], seen: false }
    ];
    
    // Feed Posts Data
    const FEED_POSTS = [
        { user: USERS[0], time: "2m ago", emoji: "🌆", likes: "4.8K", comments: "312", shares: "98" },
        { user: USERS[3], time: "15m ago", emoji: "🍲", likes: "2.1K", comments: "87", shares: "44" },
        { user: USERS[1], time: "1h ago", emoji: "🕺", likes: "8.9K", comments: "1.2K", shares: "567" }
    ];
    
    let currentTab = "messages";
    let currentChat = null;
    let currentFilter = "all";
    let searchQuery = "";
    
    function render() {
        if (currentTab === "messages" && !currentChat) renderMessagesScreen();
        else if (currentTab === "home") renderHomeScreen();
        else if (currentTab === "profile") renderProfileScreen();
        else if (currentTab === "create") renderCreateScreen();
        else if (currentTab === "reels") renderReelsScreen();
    }
    
    function renderMessagesScreen() {
        let filtered = CHATS.filter(chat => {
            const name = chat.user.name.toLowerCase();
            const match = name.includes(searchQuery.toLowerCase());
            if (currentFilter === "unread") return match && chat.unread > 0;
            return match;
        });
        
        const container = document.getElementById("chat-list");
        if (!container) return;
        
        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align: center; padding: 40px; color: #7b7b9a;">💬 No chats found</div>`;
            return;
        }
        
        container.innerHTML = filtered.map(chat => `
            <div class="chat-row" onclick="openChat(${chat.id})">
                <div class="avatar" style="background: ${chat.user.color}; width: 52px; height: 52px; font-size: 18px;">${chat.user.avatar}</div>
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <strong style="color: ${chat.unread > 0 ? '#f0f0ff' : '#7b7b9a'}">${chat.user.name}</strong>
                        <span style="font-size: 11px; color: ${chat.unread > 0 ? '#ff2d6f' : '#7b7b9a'}">${chat.time}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                        <span style="color: #7b7b9a; font-size: 13px;">${chat.lastMsg}</span>
                        ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
                    </div>
                </div>
            </div>
        `).join("");
    }
    
    function renderHomeScreen() {
        const storiesContainer = document.getElementById("stories-row");
        if (storiesContainer) {
            storiesContainer.innerHTML = `
                <div class="story">
                    <div class="story-ring"><div class="story-inner">+</div></div>
                    <span style="color: #7b7b9a; font-size: 11px;">Your story</span>
                </div>
                ${STORIES.map(s => `
                    <div class="story">
                        <div class="story-ring"><div class="story-inner" style="background: ${s.user.color};">${s.user.avatar}</div></div>
                        <span style="color: ${s.seen ? '#7b7b9a' : '#f0f0ff'}; font-size: 11px;">${s.user.name.split(" ")[0]}</span>
                    </div>
                `).join("")}
            `;
        }
        
        const feedContainer = document.getElementById("feed-posts");
        if (feedContainer) {
            feedContainer.innerHTML = FEED_POSTS.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <div class="avatar" style="background: ${post.user.color};">${post.user.avatar}</div>
                        <div>
                            <strong>${post.user.name}</strong>
                            <div style="font-size: 11px; color: #7b7b9a;">${post.time}</div>
                        </div>
                    </div>
                    <div class="post-content">${post.emoji}</div>
                    <div class="post-stats">
                        <button class="stat-btn">❤️ ${post.likes}</button>
                        <button class="stat-btn">💬 ${post.comments}</button>
                        <butto
