<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIVID - Social App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            color: #f0f0ff;
        }
        
        #app {
            max-width: 430px;
            margin: 0 auto;
            height: 100vh;
            background: #0a0a0f;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Bottom Tab Bar */
        .tab-bar {
            background: #13131f;
            display: flex;
            height: 70px;
            border-top: 1px solid rgba(42,42,64,0.3);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-icon {
            font-size: 24px;
        }
        
        .tab-label {
            font-size: 10px;
            font-weight: 600;
            color: #7b7b9a;
        }
        
        .tab-active .tab-label {
            color: #ff2d6f;
        }
        
        .screen {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 0;
        }
        
        .hide {
            display: none !important;
        }
        
        /* Headers */
        .header {
            padding: 16px 18px;
            background: #0a0a0f;
            border-bottom: 1px solid #2a2a40;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff2d6f, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Stories */
        .story-row {
            display: flex;
            gap: 14px;
            padding: 14px 0 14px 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .story-row::-webkit-scrollbar {
            display: none;
        }
        
        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .story-ring {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff2d6f, #7c3aed, #00e5ff);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .story-inner {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        /* Post Card */
        .post-card {
            background: #13131f;
            border-bottom: 1px solid #2a2a40;
            margin-bottom: 0;
        }
        
        .post-header {
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        
        .post-content {
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            background-size: cover;
        }
        
        .post-stats {
            display: flex;
            gap: 20px;
            padding: 12px 16px;
        }
        
        .stat-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            color: #7b7b9a;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Chat List */
        .chat-row {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 12px 18px;
            border-bottom: 1px solid rgba(42,42,64,0.2);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-row:active {
            background: rgba(26,26,46,0.5);
        }
        
        /* Chat Detail */
        .chat-header {
            padding: 12px 14px;
            background: #13131f;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #2a2a40;
            flex-shrink: 0;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 76%;
            padding: 10px 13px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .message-out {
            background: linear-gradient(135deg, #ff2d6f, #7c3aed);
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
        }
        
        .message-in {
            background: #1e1e35;
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
        }
        
        .chat-input-bar {
            padding: 10px 12px;
            background: #13131f;
            border-top: 1px solid #2a2a40;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            background: #1a1a2e;
            border-radius: 24px;
            padding: 12px 16px;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #ff2d6f, #7c3aed);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: white;
            padding: 4px;
        }
        
        /* Profile */
        .profile-card {
            text-align: center;
            padding: 28px 20px;
            background: linear-gradient(180deg, rgba(255,45,111,0.15) 0%, transparent 100%);
        }
        
        .avatar-lg {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
        }
        
        /* Reels */
        .reel-container {
            position: relative;
            height: 100%;
            background: linear-gradient(160deg, #ff2d6f, #7c3aed, #0a0a0f);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 100px 16px 120px;
        }
        
        /* Filters */
        .filter-btn {
            transition: all 0.2s;
        }
        
        .unread-badge {
            background: #ff2d6f;
            border-radius: 12px;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
            padding: 0 6px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        
        .modal-content {
            background: #13131f;
            border-radius: 28px 28px 0 0;
            padding: 24px 20px 32px;
            width: 100%;
            max-width: 430px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff2d6f, #7c3aed);
            border: none;
            border-radius: 14px;
            padding: 12px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .emoji-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background: #13131f;
            border-top: 1px solid #2a2a40;
        }
        
        .emoji-btn {
            background: #1a1a2e;
            border: none;
            font-size: 24px;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .msg-time {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-align: right;
            margin-top: 4px;
        }
        
        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00e676;
            display: inline-block;
            margin-left: 6px;
        }
        
        .search-box {
            background: #1a1a2e;
            border-radius: 14px;
            padding: 10px 14px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-input {
            background: none;
            border: none;
            color: white;
            flex: 1;
            outline: none;
            font-size: 15px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        
        .create-card {
            background: #13131f;
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>

<div id="app">

    <!-- ==================== CREATE SCREEN ==================== -->

                <div class="create-card" onclick="alert('Effects - Coming Soon')"><div style="font-size: 52px;">✨</div><div style="font-weight: bold; margin-top: 8px;">Effects</div></div>
                <div class="create-card" onclick="alert('Sound - Coming Soon')"><div style="font-size: 52px;">🎵</div><div style="font-weight: bold; margin-top: 8px;">Sound</div></div>
            </div>
        </div>
    </div>
    
    <!-- ==================== CHAT DETAIL VIEW ==================== -->
    <div id="chat-detail" class="hide" style="display: flex; flex-direction: column; height: 100%;">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">←</button>
            <div id="chat-avatar" class="avatar" style="width: 44px; height: 44px;"></div>
            <div style="flex: 1;">
                <div id="chat-name" style="font-weight: bold; font-size: 16px;"></div>
                <div id="chat-status" style="font-size: 12px; color: #7b7b9a;"></div>
            </div>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div style="padding: 10px 12px; background: #13131f; border-top: 1px solid #2a2a40;">
            <div style="display: flex; gap: 8px; align-items: center;">
                <button onclick="toggleEmoji()" style="background: #1a1a2e; border: none; border-radius: 30px; width: 44px; height: 44px; font-size: 22px; cursor: pointer;">😊</button>
                <input type="text" id="message-input" class="chat-input" placeholder="Message..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">📤</button>
            </div>
            <div id="emoji-row" style="display: none; margin-top: 10px; gap: 8px; flex-wrap: wrap;">
                <!-- Emojis will be populated here -->
            </div>
        </div>
    </div>
    
    <!-- ==================== BOTTOM TAB BAR ==================== -->
    <div class="tab-bar">
        <button class="tab-btn" data-tab="messages">
            <div class="tab-icon">💬</div>
            <div class="tab-label">Chats</div>
        </button>
        <button class="tab-btn" data-tab="home">
            <div class="tab-icon">🏠</div>
            <div class="tab-label">Feed</div>
        </button>
        <button class="tab-btn" data-tab="create">
            <div class="tab-icon">📷</div>
            <div class="tab-label">Create</div>
        </button>
        <button class="tab-btn" data-tab="reels">
            <div class="tab-icon">🎬</div>
            <div class="tab-label">Reels</div>
        </button>
        <button class="tab-btn" data-tab="profile">
            <div class="tab-icon">👤</div>
            <div class="tab-label">Me</div>
        </button>
    </div>
</div>
